{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-burgundy-dark/10">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96 border">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-extrabold text-burgundy tracking-wider">Claret <span class="text-gold">POS</span></h2>
            <p class="text-sm text-gray-400 mt-2">管理後台安全登入 (admin/admin)</p>
        </div>
        {% if error %}<div class="bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-4 text-center">{{ error }}</div>{% endif %}
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">管理者帳號</label>
                <input type="text" name="username" required class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-burgundy focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">密碼</label>
                <input type="password" name="password" required class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-burgundy focus:outline-none">
            </div>
            <button type="submit" class="w-full bg-burgundy hover:bg-burgundy-light text-white font-bold py-2.5 rounded-xl transition">登入系統</button>
        </form>
    </div>
</div>
{% endblock %}
